x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_METRICS_EXPORTER: otlp
  OTEL_TRACES_EXPORTER: none
  OTEL_LOGS_EXPORTER: none
  OTEL_METRIC_EXPORT_INTERVAL: 10000
  OTEL_METRIC_EXPORT_TIMEOUT: 30000
  OTEL_RESOURCE_ATTRIBUTES: service.namespace=url-shortener

services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      <<: *otel-env
      BASE_URL: http://localhost:8080
      DB_URLS: http://db-1:9000,http://db-2:9000,http://db-3:9000,http://db-4:9000,http://db-5:9000
      OTEL_SERVICE_NAME: url-shortener-api
      # Overload protection: per-shard bulkhead + circuit breaker. See
      # services/api/overload.py. DB_SHARD_CONCURRENCY is the per-node budget per shard.
      DB_SHARD_CONCURRENCY: "50"
      DB_SHARD_ACQUIRE_TIMEOUT: "0.05"
      BREAKER_THRESHOLD: "5"
      BREAKER_COOLDOWN: "2.0"
    ports:
      - "8080:8080"
    depends_on:
      - db-1
      - db-2
      - db-3
      - db-4
      - db-5
      - otel-collector

  db-1:
    build:
      context: .
      dockerfile: services/db/Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: url-shortener-db-1
    ports:
      - "9001:9000"
    depends_on:
      - otel-collector

  db-2:
    build:
      context: .
      dockerfile: services/db/Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: url-shortener-db-2
    ports:
      - "9002:9000"
    depends_on:
      - otel-collector

  db-3:
    build:
      context: .
      dockerfile: services/db/Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: url-shortener-db-3
    ports:
      - "9003:9000"
    depends_on:
      - otel-collector

  db-4:
    build:
      context: .
      dockerfile: services/db/Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: url-shortener-db-4
    ports:
      - "9004:9000"
    depends_on:
      - otel-collector

  db-5:
    build:
      context: .
      dockerfile: services/db/Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: url-shortener-db-5
    ports:
      - "9005:9000"
    depends_on:
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    command:
      - --config=/etc/otelcol/config.yaml
    volumes:
      - ./observability/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4318:4318"
      - "8889:8889"

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./observability/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
